name: connman_native_comms
description: >-
  High-performance Connection Manager (ConnMan) client for Linux using native_comms and
  sdbus-cpp. Zero-copy characteristic notifications via Dart_PostCObject_DL.
version: 0.0.1

homepage:       https://github.com/jaydon2020/connman_native_comms
repository:     https://github.com/jaydon2020/connman_native_comms
issue_tracker:  https://github.com/jaydon2020/connman_native_comms/issues
documentation:  https://pub.dev/documentation/connman_native_comms/latest/

environment:
  sdk: ">=3.4.0 <4.0.0"

platforms:
  linux:

dependencies:
  ffi:  ^2.1.0
  meta: ^1.9.0
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.0
  coverage:     ^1.7.0
  lints:        ^4.0.0
  mockito:      ^5.4.0
  test:         ^1.24.0

topics:
  - connection manager
  - connman
  - ethernet
  - wifi
  - linux
  - ffi